<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>출석부 자동 정리 프로그램 (예시)</title>
<style>
  body { font-family: "맑은 고딕", sans-serif; background:#F4F6F9; color:#2A2E33; padding:60px; text-align:center; }
  .box { max-width:480px; margin:0 auto; background:#fff; border:1px solid #E3E7ED; border-radius:12px; padding:40px; }
  h1 { color:#1F4E78; font-size:20px; }
  p { color:#6B7280; font-size:14px; line-height:1.7; }
</style>
</head>
<body>
  <div class="box">
    <h1>출석부 자동 정리 프로그램 (예시 페이지)</h1>
    <p>이 페이지는 대시보드 카드의 "바로가기" 동작을 보여주기 위한 예시입니다.<br>
    실제 프로그램이 등록되면 이 파일 자리에 진짜 프로그램 html이 들어갑니다.</p>
  </div>
</body>
</html>
