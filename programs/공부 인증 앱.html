<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📚 공부 인증</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #F5F3EE; font-family: 'Noto Sans KR', sans-serif; color: #1C1B33; }
    #root { height: 100vh; max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .screen.active { display: flex; }
    .scroll { flex: 1; overflow-y: auto; padding: 20px 16px 16px; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { width: 0; }

    .hdr { background: #1C1B33; padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .hdr-title { font-family: 'Black Han Sans', sans-serif; font-size: 21px; color: #fff; }
    .hdr-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
    .hdr-badge { border-radius: 20px; padding: 5px 13px; display: flex; align-items: center; gap: 7px; }
    .bnav { flex-shrink: 0; background: #fff; border-top: 1px solid #EAE8E2; display: flex; padding: 8px 0 16px; }
    .nbtn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 6px 0; font-family: 'Noto Sans KR', sans-serif; }
    .nbtn-ico { font-size: 26px; line-height: 1; }
    .nbtn-lbl { font-size: 11px; font-weight: 700; }

    .card { background: #fff; border-radius: 18px; margin-bottom: 14px; overflow: hidden; border: 1px solid #EAE8E2; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .stripe { height: 5px; }
    .cbody { padding: 14px 16px 12px; }
    .crow { display: flex; align-items: center; justify-content: space-between; }
    .cimg { width: 100%; max-height: 320px; object-fit: cover; display: block; }
    .cnote { margin-top: 10px; font-size: 15px; color: #3A3733; line-height: 1.65; }
    .ctime { font-size: 12px; color: #B0ADA7; }
    .csched { font-size: 12px; color: #9B9690; margin-top: 6px; line-height: 1.8; }

    .btn { border: none; border-radius: 14px; padding: 15px 24px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; font-family: 'Noto Sans KR', sans-serif; transition: opacity 0.15s; }
    .btn:active { opacity: 0.8; }
    .btn:disabled { background: #D5D3CE !important; color: #999 !important; cursor: default; }
    .btn-outline { background: #fff !important; border: 1.5px solid #E0DDD8; color: #9B9690 !important; }
    .inp { background: #fff; border: 1.5px solid #E0DDD8; border-radius: 12px; padding: 13px 16px; font-size: 16px; width: 100%; outline: none; font-family: 'Noto Sans KR', sans-serif; color: #1C1B33; }
    .inp:focus { border-color: #1C1B33; }
    textarea.inp { resize: none; height: 90px; }
    input[type=time].inp { font-size: 16px; padding: 10px 12px; }
    input[type=time]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
    .lbl { font-size: 12px; font-weight: 700; color: #8A877E; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; display: block; }
    .fg { margin-bottom: 24px; }

    /* Per-day time rows */
    .day-time-rows { margin-top: 14px; }
    .day-time-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: #FAFAF7; border-radius: 12px; padding: 10px 12px; }
    .day-time-label { font-weight: 700; font-size: 16px; width: 22px; flex-shrink: 0; text-align: center; }
    .day-time-row .inp { flex: 1; min-width: 0; }
    .time-sep { font-size: 16px; font-weight: 700; color: #9B9690; flex-shrink: 0; }

    .setup-scroll { flex: 1; overflow-y: auto; padding: 56px 28px 48px; }
    .setup-scroll::-webkit-scrollbar { width: 0; }
    .big-title { font-family: 'Black Han Sans', sans-serif; font-size: 34px; color: #1C1B33; margin-bottom: 8px; }
    .big-sub { color: #9B9690; font-size: 16px; line-height: 1.7; margin-bottom: 40px; }
    .cgrid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
    .cswatch { width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 4px solid transparent; transition: all 0.15s; }
    .dgrid { display: flex; gap: 8px; flex-wrap: wrap; }
    .dbtn { padding: 11px 17px; border-radius: 11px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }

    .upload-zone { background: #fff; border-radius: 18px; margin-bottom: 14px; overflow: hidden; border: 2px dashed #D0CEC8; cursor: pointer; text-align: center; padding: 52px 24px; }
    .upload-zone.filled { border-style: solid; padding: 0; }
    .sc { background: #fff; border-radius: 18px; margin-bottom: 10px; border: 1px solid #EAE8E2; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
    .sc-av { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Black Han Sans', sans-serif; font-size: 18px; color: #fff; flex-shrink: 0; }
    .today-tag { background: #E8F5E9; color: #2E7D32; font-size: 12px; font-weight: 700; border-radius: 20px; padding: 5px 12px; flex-shrink: 0; white-space: nowrap; }
    .badge { border-radius: 20px; padding: 5px 12px; display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 700; }
    .bdot { width: 9px; height: 9px; border-radius: 50%; }
    .stitle { font-size: 12px; font-weight: 700; color: #9B9690; text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 16px; }
    .empty { text-align: center; padding: 64px 24px; color: #9B9690; }

    /* Comments */
    .comment-toggle { padding: 10px 16px 12px; font-size: 13px; color: #9B9690; cursor: pointer; border-top: 1px solid #F0EDE8; display: flex; align-items: center; gap: 6px; user-select: none; }
    .comment-toggle:active { background: #FAFAF7; }
    .comment-section { border-top: 1px solid #F0EDE8; padding: 14px 16px 16px; display: none; }
    .comment-item { display: flex; gap: 8px; margin-bottom: 10px; }
    .comment-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .comment-bubble { background: #F5F3EE; border-radius: 12px; padding: 8px 12px; flex: 1; min-width: 0; }
    .comment-name { font-size: 12px; font-weight: 700; }
    .comment-text { font-size: 14px; color: #3A3733; margin-top: 2px; line-height: 1.5; word-break: break-all; }
    .comment-ts { font-size: 11px; color: #B0ADA7; margin-top: 3px; }
    .comment-input-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
    .comment-input-row input { flex: 1; background: #F5F3EE; border: none; border-radius: 20px; padding: 10px 14px; font-size: 14px; outline: none; font-family: 'Noto Sans KR', sans-serif; color: #1C1B33; }
    .comment-send { background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1; }

    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); border-radius: 30px; padding: 12px 24px; font-size: 15px; font-weight: 700; white-space: nowrap; z-index: 999; pointer-events: none; display: none; color: #fff; }
  </style>
</head>
<body>
<div id="root">

  <div id="screen-loading" class="screen active" style="align-items:center;justify-content:center;background:#F5F3EE">
    <div style="text-align:center">
      <div style="font-size:56px;margin-bottom:16px">📚</div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:30px;color:#1C1B33">공부 인증</div>
      <div style="color:#9B9690;margin-top:8px;font-size:15px">불러오는 중...</div>
    </div>
  </div>

  <div id="screen-name" class="screen">
    <div class="setup-scroll">
      <div style="font-size:52px;margin-bottom:20px">👋</div>
      <div class="big-title">안녕하세요!</div>
      <div class="big-sub">공부 인증 앱에 오신 것을 환영해요.<br>이름과 내 컬러를 선택해주세요!</div>

        <label class="lbl">내 컬러 선택</label>
        <div id="colorGrid" class="cgrid"></div>
      </div>
      <button id="saveNameBtn" class="btn" onclick="saveName()" style="color:#fff">다음 단계 →</button>

  <div id="screen-sched" class="screen" style="flex-direction:column">
    <div id="schedHdr" style="padding:54px 28px 32px;flex-shrink:0">
      <div style="font-family:'Black Han Sans',sans-serif;font-size:32px;color:#fff;margin-bottom:8px">공부 스케줄 📅</div>
      <div style="color:rgba(255,255,255,0.8);font-size:15px">요일별 공부 시간을 설정해주세요!</div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:30px 28px 48px">
      <div class="fg">
        <label class="lbl">공부하는 요일 선택</label>

  <div id="screen-main" class="screen" style="flex-direction:column">

      <div>
        <div class="hdr-title">📚 공부 인증</div>

      </div>
      <div class="hdr-badge" id="hdrBadge">
        <div class="bdot" id="hdrDot"></div>

    <div id="tab-feed" class="scroll" style="display:none"><div id="liveBar" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#9B9690"><span id="liveDot" style="width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;transition:background 0.3s"></span><span id="liveText">연결 중...</span></div><button onclick="manualRefresh()" style="background:#F5F3EE;border:1px solid #E0DDD8;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:#6A6864;cursor:pointer;font-family:'Noto Sans KR',sans-serif">🔄 새로고침</button></div><div id="feedContent"></div></div>

    <div id="tab-upload" class="scroll" style="display:none">

      <div id="uploadZone" class="upload-zone" onclick="document.getElementById('fileIn').click()">
        <div style="font-size:52px;margin-bottom:14px">📷</div>
        <div style="font-size:17px;font-weight:700;color:#6A6864">사진 선택하기</div>
        <div style="font-size:14px;color:#B0ADA7;margin-top:6px;line-height:1.7">공부하는 모습을 찍어서<br>업로드해 보세요!</div>

      <div class="fg">

        <textarea id="noteIn" class="inp" placeholder="오늘 공부 어땠나요? 자유롭게 남겨요 😊" maxlength="100"></textarea>
      </div>
      <button id="submitBtn" class="btn" onclick="submitProof()" style="color:#fff">🏅 인증 완료!</button>
    </div>

    <div id="tab-schedule" class="scroll" style="display:none">
      <div class="stitle">내 스케줄</div>
      <div class="card">
        <div class="stripe" id="myStripe"></div>
        <div style="padding:20px">
          <div class="fg">
            <label class="lbl">요일별 공부 시간</label>
            <div id="myDayGrid" class="dgrid"></div>

      <div class="stitle" style="margin-top:22px">우리 반 스케줄</div>
      <div id="classSchedList"></div>

      <div style="margin-top:32px;padding-top:24px;border-top:1px solid #EAE8E2">
        <div class="stitle">계정 관리</div>
        <button class="btn" onclick="showDeleteModal()" style="background:#FFF0F0;color:#FF4757;border:1.5px solid #FFD0D4">
          🗑️ 내 계정 삭제
        </button>
        <div style="font-size:12px;color:#B0ADA7;margin-top:10px;text-align:center;line-height:1.7">
          삭제하면 내 스케줄과 인증샷이 모두 삭제되고<br>처음 설정 화면으로 돌아가요.
        </div>

    <!-- Delete confirm modal -->
    <div id="deleteModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-end;justify-content:center">
      <div style="background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:560px">
        <div style="font-size:40px;text-align:center;margin-bottom:16px">🗑️</div>
        <div style="font-family:'Black Han Sans',sans-serif;font-size:22px;color:#1C1B33;text-align:center;margin-bottom:10px">계정을 삭제할까요?</div>
        <div style="font-size:14px;color:#9B9690;text-align:center;line-height:1.8;margin-bottom:28px">
          내 스케줄, 인증샷, 댓글이 모두 삭제돼요.<br>이 작업은 되돌릴 수 없어요.
        </div>
        <button class="btn" onclick="deleteAccount()" style="background:#FF4757;color:#fff;margin-bottom:12px">완전히 삭제할게요</button>
        <button class="btn btn-outline" onclick="hideDeleteModal()">취소</button>
      </div>
    </div>

    <div class="bnav">
      <button class="nbtn" onclick="switchTab('feed')"><div class="nbtn-ico">🏠</div><div class="nbtn-lbl" id="lbl-feed">피드</div></button>
      <button class="nbtn" onclick="switchTab('upload')"><div class="nbtn-ico">📸</div><div class="nbtn-lbl" id="lbl-upload">인증하기</div></button>
      <button class="nbtn" onclick="switchTab('schedule')"><div class="nbtn-ico">📅</div><div class="nbtn-lbl" id="lbl-schedule">스케줄</div></button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyCx8oV4UcG4-7nM3jaCk4AdnECDx1lEW3E",
  authDomain:        "gonbuhaja-be2e9.firebaseapp.com",
  databaseURL:       "https://gonbuhaja-be2e9-default-rtdb.firebaseio.com",
  projectId:         "gonbuhaja-be2e9",
  storageBucket:     "gonbuhaja-be2e9.firebasestorage.app",
  messagingSenderId: "77308716735",
  appId:             "1:77308716735:web:f05379754c769a88afc80a"
};

const DAYS = ["월","화","수","목","금","토","일"];
const TODAY = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
const PALETTE = [
  "#FF6B6B","#FF4757","#FF6FA8","#E84393","#FF8BD2",
  "#FF9F43","#FF6348","#FFC233","#FFD32A","#F9CA24",
  "#20BF6B","#2ED573","#A3CB38","#009432","#1B9C85",
  "#00CEC9","#00B4D8","#2980B9","#1E90FF","#74B9FF",
  "#8854D0","#A855F7","#6C5CE7","#D980FA","#9980FA",
  "#EE5A24","#FD9644","#833471","#006266","#1289A7",
  "#C4E538","#B53471"
];

let myName = '', myColor = PALETTE[0];
let setupColor = PALETTE[0];
// Schedule data: { "월": { startTime:"09:00", endTime:"11:00" }, "수": {...}, ... }
let setupSched = {}, mainSched = {};
let imgData = null, db = null;

firebase.initializeApp(firebaseConfig);
db = firebase.database();

function a(hex, op=0.13) { const n=parseInt(hex.slice(1),16); return `rgba(${n>>16},${(n>>8)&255},${n&255},${op})`; }
function timeAgo(ts) {
  const d=Date.now()-ts;
  if(d<60e3) return "방금 전";
  if(d<3600e3) return Math.floor(d/60e3)+"분 전";
  if(d<86400e3) return Math.floor(d/3600e3)+"시간 전";
  return Math.floor(d/86400e3)+"일 전";
}
function resizeImg(file) {
  return new Promise(res => {
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{ const r=Math.min(1,520/img.width),c=document.createElement('canvas'); c.width=Math.round(img.width*r); c.height=Math.round(img.height*r); c.getContext('2d').drawImage(img,0,0,c.width,c.height); URL.revokeObjectURL(url); res(c.toDataURL('image/jpeg',0.62)); };
    img.src=url;
  });
}
let _tt;
function toast(msg,ok=true) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=ok?'#1C1B33':'#FF6B6B'; el.style.display='block';
  clearTimeout(_tt); _tt=setTimeout(()=>el.style.display='none',3500);
}
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }

// Format schedule for display
function fmtSched(s) {
  if (!s) return '';
  // New per-day format
  if (s.schedule && typeof s.schedule === 'object') {
    return DAYS.filter(d => d in s.schedule)
      .map(d => `${d} ${s.schedule[d].startTime}~${s.schedule[d].endTime}`)
      .join('\n');
  }
  // Legacy format fallback
  const days = (s.days||[]).join(' ');
  const t = s.startTime&&s.endTime ? `${s.startTime}~${s.endTime}` : (s.startTime||s.time||'');
  return [days, t].filter(Boolean).join(' · ');
}
function hasTodaySched(s) {
  if (!s) return false;
  if (s.schedule) return TODAY in s.schedule;
  return (s.days||[]).includes(TODAY);
}

// ── Color picker ──
function buildColorGrid(elId, picked, onPick) {
  const g=document.getElementById(elId); g.innerHTML='';
  PALETTE.forEach(c=>{ const el=document.createElement('div'); el.className='cswatch'; el.style.cssText=`background:${c};outline:${c===picked?`4px solid ${c}`:'4px solid transparent'};outline-offset:3px;transform:${c===picked?'scale(1.15)':'scale(1)'}`;el.onclick=()=>onPick(c);g.appendChild(el);});
}

// ── Per-day schedule UI ──
function buildSchedUI(dayGridId, timeRowsId, schedData, color, onUpdate) {
  // Day buttons
  const dg = document.getElementById(dayGridId);
  dg.innerHTML = '';
  DAYS.forEach(d => {
    const active = d in schedData;
    const btn = document.createElement('button');
    btn.className = 'dbtn';
    btn.textContent = d;
    btn.style.cssText = `border:2px solid ${active?color:'#E0DDD8'};background:${active?a(color,0.14):'#fff'};color:${active?color:'#9B9690'}`;
    btn.onclick = () => {
      if (d in schedData) {
        delete schedData[d];
      } else {
        schedData[d] = { startTime: '09:00', endTime: '11:00' };
      }
      onUpdate();
    };
    dg.appendChild(btn);
  });

  // Time rows for each selected day (in DAYS order)
  const tr = document.getElementById(timeRowsId);
  tr.innerHTML = '';
  const selected = DAYS.filter(d => d in schedData);
  if (selected.length === 0) return;

  selected.forEach(d => {
    const t = schedData[d];
    const row = document.createElement('div');
    row.className = 'day-time-row';

    const label = document.createElement('div');
    label.className = 'day-time-label';
    label.textContent = d;
    label.style.color = color;

    const startIn = document.createElement('input');
    startIn.type = 'time'; startIn.className = 'inp'; startIn.value = t.startTime;
    startIn.onchange = () => { schedData[d].startTime = startIn.value; };

    const sep = document.createElement('span');
    sep.className = 'time-sep'; sep.textContent = '~';

    const endIn = document.createElement('input');
    endIn.type = 'time'; endIn.className = 'inp'; endIn.value = t.endTime;
    endIn.onchange = () => { schedData[d].endTime = endIn.value; };

    row.appendChild(label);
    row.appendChild(startIn);
    row.appendChild(sep);
    row.appendChild(endIn);
    tr.appendChild(row);
  });
}

// ── Name screen ──
function initNameScreen() {
  buildColorGrid('colorGrid', setupColor, function cp(c){ setupColor=c; buildColorGrid('colorGrid',setupColor,cp); updateNameBtn(); });
  document.getElementById('nameIn').oninput = updateNameBtn;
  document.getElementById('nameIn').onkeydown = e => { if(e.key==='Enter') saveName(); };
  updateNameBtn();
}
function updateNameBtn() { document.getElementById('saveNameBtn').style.background = document.getElementById('nameIn').value.trim() ? setupColor : '#D5D3CE'; }
function saveName() {
  const name = document.getElementById('nameIn').value.trim(); if(!name) return;
  myName=name; myColor=setupColor;
  localStorage.setItem('profile', JSON.stringify({name, color:myColor}));
  initSchedScreen(); showScreen('sched');
}

// ── Setup schedule screen ──
function initSchedScreen() {
  document.getElementById('schedHdr').style.background = myColor;
  document.getElementById('schedGoBtn').style.background = myColor;
  setupSched = {};
  buildSchedUI('setupDayGrid','setupTimeRows', setupSched, myColor,
    () => buildSchedUI('setupDayGrid','setupTimeRows', setupSched, myColor, arguments.callee));
  // Fix recursive ref
  const rebuild = () => buildSchedUI('setupDayGrid','setupTimeRows', setupSched, myColor, rebuild);
  buildSchedUI('setupDayGrid','setupTimeRows', setupSched, myColor, rebuild);
}
async function saveSchedAndGo() {
  try { if(db) await db.ref(`schedules/${myName}`).set({ schedule: setupSched, color: myColor }); } catch(e){ console.error(e); }
  goMain();
}
function goMain() { initMainScreen(); showScreen('main'); switchTab('feed'); }

// ── Main screen ──
function initMainScreen() {
  document.getElementById('hdrSub').textContent = `오늘 ${TODAY}요일 · 파이팅! 💪`;
  document.getElementById('hdrBadge').style.cssText = `background:${a(myColor,0.25)};border:1px solid ${myColor};border-radius:20px;padding:5px 13px;display:flex;align-items:center;gap:7px`;
  document.getElementById('hdrDot').style.background = myColor;
  document.getElementById('hdrName').textContent = myName;
  document.getElementById('hdrName').style.color = myColor;
  document.getElementById('submitBtn').style.background = myColor;
  document.getElementById('myStripe').style.background = myColor;
  document.getElementById('saveSchedBtn').style.background = myColor;
  mainSched = {};
  if(db) {
    db.ref(`schedules/${myName}`).once('value').then(snap => {
      const s = snap.val()||{};
      // Support new and legacy format
      if (s.schedule) mainSched = { ...s.schedule };
      else if (s.days) { s.days.forEach(d => mainSched[d] = { startTime: s.startTime||s.time||'09:00', endTime: s.endTime||'11:00' }); }
      buildMainSchedUI();
    }).catch(() => buildMainSchedUI());
  } else buildMainSchedUI();
}
function buildMainSchedUI() {
  const rebuild = () => buildSchedUI('myDayGrid','myTimeRows', mainSched, myColor, rebuild);
  buildSchedUI('myDayGrid','myTimeRows', mainSched, myColor, rebuild);
}

// ── Real-time feed listener ──
let feedDbRef = null, feedCb = null;

let pollTimer = null;

function makeCard(p, schedMap) {
  const card = document.createElement('div');
  card.className = 'card';

  // Color stripe
  const stripe = document.createElement('div');
  stripe.className = 'stripe';
  stripe.style.background = p.color || '#ccc';
  card.appendChild(stripe);

  // Image
  if (p.img) {
    const img = document.createElement('img');
    img.className = 'cimg';
    img.src = p.img;
    img.alt = '';
    img.loading = 'lazy';
    card.appendChild(img);
  }

  // Body
  const body = document.createElement('div');
  body.className = 'cbody';

  // Name badge + time row
  const crow = document.createElement('div');
  crow.className = 'crow';

  const badge = document.createElement('div');
  badge.className = 'badge';
  const hex = p.color || '#888';
  const n = parseInt(hex.slice(1), 16);
  const rgba = 'rgba(' + (n>>16) + ',' + ((n>>8)&255) + ',' + (n&255) + ',0.14)';
  badge.style.background = rgba;
  badge.style.border = '1px solid ' + rgba;
  const dot = document.createElement('div');
  dot.className = 'bdot';
  dot.style.background = hex;
  badge.appendChild(dot);
  const nameSpan = document.createElement('span');
  nameSpan.textContent = p.name || '알 수 없음';
  nameSpan.style.color = hex;
  badge.appendChild(nameSpan);
  crow.appendChild(badge);

  const timeEl = document.createElement('span');
  timeEl.className = 'ctime';
  timeEl.textContent = timeAgo(p.ts);
  crow.appendChild(timeEl);
  body.appendChild(crow);

  // Schedule info
  const sched = schedMap[p.name];
  if (sched) {
    const schedText = fmtSched(sched);
    if (schedText) {
      const schedDiv = document.createElement('div');
      schedDiv.className = 'csched';
      schedText.split('\n').forEach(line => {
        const d = document.createElement('div');
        d.textContent = '📅 ' + line;
        schedDiv.appendChild(d);
      });
      body.appendChild(schedDiv);
    }
  }

  // Note
  if (p.note) {
    const note = document.createElement('div');
    note.className = 'cnote';
    note.textContent = p.note;
    body.appendChild(note);
  }

  card.appendChild(body);

  // Comment toggle
  const toggle = document.createElement('div');
  toggle.className = 'comment-toggle';
  const toggleSpan = document.createElement('span');
  toggleSpan.textContent = '💬 댓글 보기';
  toggle.appendChild(toggleSpan);
  toggle.onclick = () => {
    const sec = card.querySelector('.comment-section');
    const isOpen = sec.style.display === 'block';
    sec.style.display = isOpen ? 'none' : 'block';
    toggleSpan.textContent = isOpen ? '💬 댓글 보기' : '💬 댓글 닫기';
    if (!isOpen) loadComments(p._key, card);
  };
  card.appendChild(toggle);

  // Comment section
  const commentSec = document.createElement('div');
  commentSec.className = 'comment-section';
  commentSec.style.display = 'none';

  const commentList = document.createElement('div');
  commentList.className = 'comment-list';
  commentSec.appendChild(commentList);

  const inputRow = document.createElement('div');
  inputRow.className = 'comment-input-row';
  const commentInput = document.createElement('input');
  commentInput.placeholder = '댓글을 입력하세요...';
  commentInput.maxLength = 80;
  const sendBtn = document.createElement('button');
  sendBtn.className = 'comment-send';
  sendBtn.textContent = '➤';
  const doSend = async () => {
    const text = commentInput.value.trim();
    if (!text) return;
    try {
      await db.ref('comments/' + p._key).push({name:myName, color:myColor, text, ts:Date.now()});
      commentInput.value = '';
      loadComments(p._key, card);
    } catch(e) { toast('댓글 등록 실패 😢', false); }
  };
  commentInput.onkeydown = e => { if(e.key === 'Enter') doSend(); };
  sendBtn.onclick = doSend;
  inputRow.appendChild(commentInput);
  inputRow.appendChild(sendBtn);
  commentSec.appendChild(inputRow);
  card.appendChild(commentSec);

  return card;
}

async function loadComments(key, card) {
  const listEl = card.querySelector('.comment-list');
  if (!listEl) return;
  listEl.innerHTML = '<div style="font-size:13px;color:#B0ADA7;padding:4px 0 8px">불러오는 중...</div>';
  try {
    const snap = await db.ref('comments/' + key).orderByChild('ts').once('value');
    const val = snap.val();
    if (!val) { listEl.innerHTML = '<div style="font-size:13px;color:#B0ADA7;padding:4px 0 8px">아직 댓글이 없어요. 첫 댓글을 남겨보세요! 😊</div>'; return; }
    const comments = Object.values(val).sort((a,b) => a.ts - b.ts);
    listEl.innerHTML = comments.map(c =>
      '<div class="comment-item"><div class="comment-dot" style="background:' + c.color + '"></div>' +
      '<div class="comment-bubble"><div class="comment-name" style="color:' + c.color + '">' + c.name + '</div>' +
      '<div class="comment-text">' + c.text + '</div>' +
      '<div class="comment-ts">' + timeAgo(c.ts) + '</div></div></div>'
    ).join('');
  } catch(e) { listEl.innerHTML = '<div style="font-size:13px;color:#FF6B6B">댓글 불러오기 실패</div>'; }
}

function renderFeedItems(items, schedMap) {
  const el = document.getElementById('feedContent');
  if (!el) return;
  el.innerHTML = '';
  if (!items || items.length === 0) {
    el.innerHTML = '<div class="empty"><div style="font-size:56px;margin-bottom:16px">📸</div><div style="font-size:18px;font-weight:700;color:#1C1B33;margin-bottom:10px">아직 인증샷이 없어요</div><div style="font-size:15px;line-height:1.8">가장 먼저 공부 인증을 해보세요!</div></div>';
    return;
  }
  const title = document.createElement('div');
  title.className = 'stitle';
  title.textContent = '최근 인증 ' + items.length + '개';
  el.appendChild(title);
  items.forEach(p => {
    try { el.appendChild(makeCard(p, schedMap)); }
    catch(e) { console.error('card render error:', p._key, e); }
  });
}

async function fetchAndRender() {
  try {
    // Get ALL feed items (no limit) then sort in JS — avoids Firebase ordering issues
    const [feedSnap, schedSnap] = await Promise.all([
      db.ref('feed').once('value'),
      db.ref('schedules').once('value')
    ]);
    const schedMap = {};
    if (schedSnap.val()) Object.entries(schedSnap.val()).forEach(([n,s]) => schedMap[n] = s);
    const val = feedSnap.val();
    const items = val
      ? Object.entries(val).map(([k,v]) => ({...v, _key:k})).sort((a,b) => (b.ts||0)-(a.ts||0)).slice(0,30)
      : [];
    renderFeedItems(items, schedMap);
    setLive(true);
  } catch(e) {
    console.error('fetchAndRender error:', e);
    setLive(false);
  }
}

function startFeedListener() {
  stopFeedListener();
  const el = document.getElementById('feedContent');
  el.innerHTML = '<div class="empty"><div style="font-size:40px;margin-bottom:12px">⏳</div>불러오는 중...</div>';
  setLive(false);

  // Real-time listener — fires immediately and on every change
  feedDbRef = db.ref('feed');
  feedCb = feedDbRef.on('value', async () => {
    await fetchAndRender();
  }, () => {
    setLive(false);
    fetchAndRender();
  });

  // Polling backup every 15 seconds
  clearInterval(pollTimer);
  pollTimer = setInterval(fetchAndRender, 15000);
}

function switchTab(tab) {
  if(tab !== 'feed') stopFeedListener();
  ['feed','upload','schedule'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('lbl-'+t).style.color = t===tab ? myColor : '#9B9690';
  });
  if(tab==='feed') startFeedListener();
  if(tab==='schedule') { buildMainSchedUI(); loadClassSchedules(); }
}

function stopFeedListener() {
  if (feedDbRef && feedCb) { feedDbRef.off('value', feedCb); feedDbRef = null; feedCb = null; }
  clearInterval(pollTimer); pollTimer = null;
}

async function manualRefresh() {
  const btn = document.querySelector('[onclick="manualRefresh()"]');
  if (btn) { btn.textContent = '⏳ 로딩중...'; btn.disabled = true; }
  await fetchAndRender();
  if (btn) { btn.textContent = '🔄 새로고침'; btn.disabled = false; }
}

// ── Comments (handled inside makeCard) ──

// ── Class schedules ──
async function loadClassSchedules() {
  const el=document.getElementById('classSchedList'); el.innerHTML='';
  try {
    const snap=await db.ref('schedules').once('value'), val=snap.val();
    if(!val){ el.innerHTML='<div style="text-align:center;padding:28px;color:#9B9690;font-size:15px">아직 스케줄을 등록한 친구가 없어요</div>'; return; }
    Object.entries(val).forEach(([name,s]) => {
      const isToday = hasTodaySched(s);
      const schedText = fmtSched(s);
      const div=document.createElement('div'); div.className='sc';
      div.innerHTML=`
        <div class="sc-av" style="background:${s.color||'#888'}">${name[0]}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:15px;color:#1C1B33;margin-bottom:4px">${name}</div>
          ${schedText ? schedText.split('\n').map(l=>`<div style="font-size:13px;color:#9B9690">${l}</div>`).join('') : '<div style="font-size:13px;color:#9B9690">미설정</div>'}
        </div>
        ${isToday?'<div class="today-tag">오늘 📖</div>':''}`;
      el.appendChild(div);
    });
  } catch(e){ console.error(e); }
}
async function saveSched() {
  try {
    await db.ref(`schedules/${myName}`).set({ schedule: mainSched, color: myColor });
    toast('스케줄 저장 완료! 📅');
  } catch(e){ toast('저장 실패 😢',false); }
}

// ── Upload ──
async function onFile(e) {
  const f=e.target.files?.[0]; if(!f) return;
  if(!f.type.startsWith('image/')){ toast('이미지 파일을 선택해주세요!',false); return; }
  imgData=await resizeImg(f);
  const z=document.getElementById('uploadZone'); z.className='upload-zone filled'; z.style.borderColor=myColor;
  z.innerHTML=`<img src="${imgData}" style="width:100%;max-height:280px;object-fit:cover;display:block">`; z.onclick=null;
  document.getElementById('reselBtn').style.display='block';
}
function resetImg() {
  imgData=null; document.getElementById('fileIn').value='';
  const z=document.getElementById('uploadZone'); z.className='upload-zone'; z.style.borderColor='';
  z.innerHTML='<div style="font-size:52px;margin-bottom:14px">📷</div><div style="font-size:17px;font-weight:700;color:#6A6864">사진 선택하기</div><div style="font-size:14px;color:#B0ADA7;margin-top:6px;line-height:1.7">공부하는 모습을 찍어서<br>업로드해 보세요!</div>';
  z.onclick=()=>document.getElementById('fileIn').click();
  document.getElementById('reselBtn').style.display='none';
}
async function submitProof() {
  if(!imgData){ toast('사진을 선택해주세요! 📸',false); return; }
  const btn=document.getElementById('submitBtn'); btn.textContent='업로드 중... ⏳'; btn.disabled=true;
  try {
    const note=document.getElementById('noteIn').value.trim();
    await db.ref('feed').push({name:myName,color:myColor,note,ts:Date.now(),img:imgData});
    // 100개 초과 시 오래된 것부터 삭제 (방금 올린 건 절대 안 지워짐)
    try {
      const allSnap = await db.ref('feed').orderByChild('ts').once('value');
      const keys = [];
      allSnap.forEach(c => keys.push(c.key));
      if(keys.length > 100) {
        const toDelete = keys.slice(0, keys.length - 100);
        await Promise.all(toDelete.map(k => db.ref('feed/' + k).remove()));
      }
    } catch(e) { console.error('cleanup error:', e); }
    toast('인증 완료! 🎉 파이팅!'); resetImg(); document.getElementById('noteIn').value=''; switchTab('feed');
  } catch(e){ toast('업로드 실패 😢 이미지가 너무 크거나 오류 발생',false); }
  btn.textContent='🏅 인증 완료!'; btn.disabled=false;
}

// ── Account delete ──
function showDeleteModal() {
  const modal = document.getElementById('deleteModal');
  modal.style.display = 'flex';
}
function hideDeleteModal() {
  document.getElementById('deleteModal').style.display = 'none';
}
async function deleteAccount() {
  hideDeleteModal();
  toast('삭제 중...', true);
  try {
    // Delete schedule
    await db.ref('schedules/' + myName).remove();

    // Delete my posts from feed
    const feedSnap = await db.ref('feed').orderByChild('name').equalTo(myName).once('value');
    const feedDeletes = [];
    feedSnap.forEach(child => {
      feedDeletes.push(db.ref('feed/' + child.key).remove());
      feedDeletes.push(db.ref('comments/' + child.key).remove());
    });
    await Promise.all(feedDeletes);

    // Clear local storage & reset
    localStorage.removeItem('profile');
    stopFeedListener();
    myName = ''; myColor = PALETTE[0]; setupColor = PALETTE[0];
    setupSched = {}; mainSched = {};
    showScreen('name');
    initNameScreen();
    toast('계정이 삭제됐어요 👋');
  } catch(e) {
    console.error(e);
    toast('삭제 실패 😢 다시 시도해주세요', false);
  }
}

// ── Init ──
window.onload = () => {
  const stored=localStorage.getItem('profile');
  if(stored){ try{ const p=JSON.parse(stored); myName=p.name; myColor=p.color; initMainScreen(); showScreen('main'); switchTab('feed'); return; }catch{} }
  initNameScreen(); showScreen('name');
};
